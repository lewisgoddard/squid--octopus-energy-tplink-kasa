name = "kraken"
main = "index.js"
compatibility_date = "2026-06-01"

[triggers]
# 32 */4 * * *  -> refresh Octopus rates (every 4 hours)
# 0,30 * * * *  -> evaluate Kasa devices against the current rate (every half hour)
crons = ["32 */4 * * *", "0,30 * * * *"]

[[d1_databases]]
binding = "DATABASE"
database_name = "kraken-db"
database_id = "36fdd91a-daca-48e9-ac7a-f4c98465cba1"
