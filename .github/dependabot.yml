version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-patching:
        update-types:
          - "minor"
          - "patch"

  # The Squid Worker.
  - package-ecosystem: "npm"
    directory: "/squid"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    groups:
      npm-patching:
        update-types:
          - "minor"
          - "patch"

  # The TP-Link V2 cloud relay Worker.
  - package-ecosystem: "npm"
    directory: "/relay"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    groups:
      npm-patching:
        update-types:
          - "minor"
          - "patch"

  # The relay container base image (node:24-alpine).
  - package-ecosystem: "docker"
    directory: "/relay"
    schedule:
      interval: "weekly"
    groups:
      docker-patching:
        update-types:
          - "minor"
          - "patch"
