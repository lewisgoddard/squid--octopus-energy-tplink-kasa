name = "kraken"
main = "index.js"
compatibility_date = "2026-06-01"
# node:crypto (MD5 + HMAC-SHA1) for the Tapo/Kasa-v2 V2 request signing (signV2).
compatibility_flags = ["nodejs_compat"]

[triggers]
# 32 * * * *    -> refresh Octopus rates (hourly; updateRates skips the API pull
#                  when today+tomorrow are already cached, so most runs are no-ops)
# 0,30 * * * *  -> evaluate Kasa devices against the current rate (every half hour)
crons = ["32 * * * *", "0,30 * * * *"]

[[d1_databases]]
binding = "DATABASE"
database_name = "kraken-db"
database_id = "36fdd91a-daca-48e9-ac7a-f4c98465cba1"
