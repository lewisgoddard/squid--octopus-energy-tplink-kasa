name = "tapo-relay"
main = "worker.mjs"
compatibility_date = "2026-06-08"
# No public URL: the relay is reachable only via a service binding from the Squid Worker.
# That binding is the access control (so there's no public ingress and no shared secret).
workers_dev = false

# The CA-trusting forwarder runs in a container (a Worker's fetch can't trust the
# TP-Link private CA). See Dockerfile + forwarder.mjs.
[[containers]]
class_name = "TapoRelay"
image = "./Dockerfile"
# Stateless forwarder — one instance is plenty (scale-to-zero between uses). To scale,
# raise this and load-balance with getRandom() in worker.mjs (see relay/README.md).
max_instances = 1

  # Keep the relay in the EU (it transits per-user TP-Link traffic). `jurisdiction = "eu"`
  # is a compliance boundary (EU data centres only: EEUR/WEUR).
  [containers.constraints]
  jurisdiction = "eu"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "TapoRelay"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TapoRelay"]

# Squid reaches this Worker via a service binding (added to squid/wrangler.toml at
# integration, once this is deployable). No secret/vars here — the binding is the gate.
