name = "tapo-relay"
main = "worker.mjs"
compatibility_date = "2026-06-08"

# The CA-trusting forwarder runs in a container (a Worker's fetch can't trust the
# TP-Link private CA). See Dockerfile + forwarder.mjs.
[[containers]]
class_name = "TapoRelay"
image = "./Dockerfile"
# Stateless forwarder — one instance is plenty (scale-to-zero between uses). To scale,
# raise this and load-balance with getRandom() in worker.mjs (see relay/README.md).
max_instances = 1

  # Keep the relay in the EU (it transits per-user TP-Link traffic). `jurisdiction = "eu"`
  # is a compliance boundary (EU data centres only: EEUR/WEUR).
  [containers.constraints]
  jurisdiction = "eu"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "TapoRelay"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TapoRelay"]

# RELAY_SECRET gates the relay and is a SECRET, not a var — deliberately NOT declared
# here. A committed `[vars] RELAY_SECRET` would be re-applied (in plaintext) on every
# `wrangler deploy`, overriding the value set via `wrangler secret put` and leaking it
# into git. Set it once with `wrangler secret put RELAY_SECRET` (persists across deploys);
# for local dev put it in `relay/.dev.vars`. The Worker fails closed (401) until it's set.
